name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate --workspace=@telemart/api
      - run: npm run build

  api-e2e:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: telemart
          POSTGRES_PASSWORD: telemart
          POSTGRES_DB: telemart
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      DATABASE_URL: postgresql://telemart:telemart@localhost:5432/telemart?schema=public
      REDIS_URL: redis://localhost:6379
      MONGODB_URI: mongodb://localhost:27017/telemart
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@telemart/types
      - run: npm run db:generate --workspace=@telemart/api
      - run: npm run db:push --workspace=@telemart/api
      - run: npm run db:seed --workspace=@telemart/api
      - run: npm run test:api
